name: Cleanup Old Deployments

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types:
      - completed

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      deployments: write

    steps:
      - name: Delete all deployments except the latest
        uses: actions/github-script@v7
        with:
          script: |
            // Fetch all deployments using pagination
            const deployments = await github.paginate(github.rest.repos.listDeployments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            if (deployments.length <= 1) {
              console.log('One deployment or fewer found — nothing to delete.');
              return;
            }

            // Sort by newest first and skip the latest one
            const sorted = deployments.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            const toDelete = sorted.slice(1);

            console.log(`Found ${deployments.length} deployment(s). Keeping the latest (id=${sorted[0].id}). Deleting ${toDelete.length} older deployment(s).`);

            let deleted = 0;
            let failed = 0;

            for (const deployment of toDelete) {
              try {
                // A deployment must be inactive before it can be deleted
                await github.rest.repos.createDeploymentStatus({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  deployment_id: deployment.id,
                  state: 'inactive',
                });

                await github.rest.repos.deleteDeployment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  deployment_id: deployment.id,
                });

                console.log(`Deleted deployment id=${deployment.id} (${deployment.environment}, created ${deployment.created_at})`);
                deleted++;
              } catch (err) {
                console.error(`Failed to delete deployment id=${deployment.id}: ${err.message}`);
                failed++;
              }
            }

            console.log(`Done. Deleted: ${deleted}, Failed: ${failed}.`);
            if (failed > 0) {
              core.setFailed(`${failed} deployment(s) could not be deleted.`);
            }
